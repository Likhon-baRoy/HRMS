<mat-sidenav-container class="layout">
  <mat-sidenav mode="side" opened>
    <div class="logo">HRMS</div>

    <mat-nav-list>
      <a mat-list-item routerLink="/profile">My Profile</a>

      <a mat-list-item routerLink="/attendance">Attendance</a>

      @if (isStaff) {
        <a mat-list-item routerLink="/dashboard">Dashboard</a>

        <a mat-list-item routerLink="/employees">Employees</a>

        @if (isHrOrAdmin) {
          <a mat-list-item routerLink="/departments">Departments</a>

          <a mat-list-item routerLink="/positions">Positions</a>

          <a mat-list-item routerLink="/salary">Salary</a>

          <a mat-list-item routerLink="/payroll">Payroll</a>
        }

        @if (isAdmin) {
          <a mat-list-item routerLink="/users">Users</a>
        }
      }

    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <span> HRMS </span>

      <span class="spacer"> </span>

      <button mat-button (click)="logout()">Logout</button>
    </mat-toolbar>

    <div class="content">
      <router-outlet> </router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
