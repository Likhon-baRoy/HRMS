<div class="page-header">
  <h2>
    {{ isEmployee ? 'My Attendance' : 'Attendance' }}
  </h2>

  <div class="actions">
    <mat-form-field appearance="outline">
      <mat-label>Remarks</mat-label>
      <input
        matInput
        [(ngModel)]="remarks"
        maxlength="250"
        placeholder="Optional"
      />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="checkIn()">
      Check In
    </button>

    <button mat-raised-button color="accent" (click)="checkOut()">
      Check Out
    </button>
  </div>
</div>

<table mat-table [dataSource]="attendances" class="mat-elevation-z2 full-width">
  <ng-container matColumnDef="employee">
    <th mat-header-cell *matHeaderCellDef>
      Employee
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.employeeName }}
    </td>
  </ng-container>

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>
      Date
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.date }}
    </td>
  </ng-container>

  <ng-container matColumnDef="checkIn">
    <th mat-header-cell *matHeaderCellDef>
      Check In
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.checkInTime | date: 'shortTime' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="checkOut">
    <th mat-header-cell *matHeaderCellDef>
      Check Out
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.checkOutTime | date: 'shortTime' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>
      Status
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.status }}
    </td>
  </ng-container>

  <ng-container matColumnDef="remarks">
    <th mat-header-cell *matHeaderCellDef>
      Remarks
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.remarks }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="
      let row;
      columns: displayedColumns
    "></tr>
</table>
