<div class="page-header">
  <h2>Positions</h2>

  <button mat-raised-button color="primary" (click)="create()">
    Add Position
  </button>
</div>

<table mat-table [dataSource]="positions" class="mat-elevation-z2 full-width">
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>
      Title
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.title }}
    </td>
  </ng-container>

  <ng-container matColumnDef="jobLevel">
    <th mat-header-cell *matHeaderCellDef>
      Level
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.jobLevel }}
    </td>
  </ng-container>

  <ng-container matColumnDef="department">
    <th mat-header-cell *matHeaderCellDef>
      Department
    </th>

    <td mat-cell *matCellDef="let row">
      {{ row.departmentName }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>
      Actions
    </th>

    <td mat-cell *matCellDef="let row">
      <button mat-icon-button color="primary" (click)="edit(row)">
        <mat-icon>
          edit
        </mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="delete(row.id)">
        <mat-icon>
          delete
        </mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="
      let row;
      columns: displayedColumns
    "></tr>
</table>
