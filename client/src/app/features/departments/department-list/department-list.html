<mat-card>

  <div class="header">

    <h2> Departments </h2>

    <button mat-raised-button color="primary" (click)="create()"> Add Department </button>

  </div>

  <table mat-table [dataSource]="departments">

    <ng-container matColumnDef="id">

      <th mat-header-cell *matHeaderCellDef>
        ID
      </th>

      <td mat-cell *matCellDef="let row">
        {{ row.id }}
      </td>

    </ng-container>

    <ng-container matColumnDef="name">

      <th mat-header-cell *matHeaderCellDef>
        Name
      </th>

      <td mat-cell *matCellDef="let row">
        {{ row.name }}
      </td>

    </ng-container>

    <ng-container matColumnDef="managerName">

      <th mat-header-cell *matHeaderCellDef>
        Manager
      </th>

      <td mat-cell *matCellDef="let row">
        {{ row.managerName }}
      </td>

    </ng-container>

    <ng-container matColumnDef="actions">

      <th mat-header-cell *matHeaderCellDef>
        Actions
      </th>

      <td mat-cell *matCellDef="let row">

        <button mat-button (click)="edit(row)"> Edit </button>

        <button mat-button color="warn" (click)="delete(row.id)"> Delete </button>

      </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="
        displayedColumns
      ">
    </tr>

    <tr mat-row *matRowDef="
        let row;
        columns:
        displayedColumns
      ">
    </tr>

  </table>

</mat-card>
