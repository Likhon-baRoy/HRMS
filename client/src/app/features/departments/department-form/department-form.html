<h2 mat-dialog-title>

  {{ data ? 'Edit' : 'Create' }}
  Department

</h2>

<mat-dialog-content>

  <form [formGroup]="form">

    <mat-form-field appearance="outline">

      <mat-label>
        Name
      </mat-label>

      <input matInput formControlName="name">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>
        Description
      </mat-label>

      <textarea matInput formControlName="description">
      </textarea>

    </mat-form-field>

  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button mat-dialog-close>
    Cancel
  </button>

  <button mat-raised-button color="primary" (click)="save()">
    Save
  </button>

</mat-dialog-actions>
